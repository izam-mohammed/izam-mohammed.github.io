# deploys a bunch of html files to the internet
# yes this needs a whole yaml file. welcome to modern software engineerin'.
name: ship it before i change my mind

on:
  # every push to main = instant regret
  push:
    branches: ["main"]

  # panic button
  workflow_dispatch:

# givin' github just enough power to do its job
permissions:
  contents: read
  pages: write
  id-token: write

# one deployment at a time. we're not animals.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # the entire "build pipeline" for a static site lmao
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: grab the code
        uses: actions/checkout@v4

      - name: pretend we have a build step
        uses: actions/configure-pages@v5

      - name: zip it up like it's somethin' important
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: yeet it to the internet
        id: deployment
        uses: actions/deploy-pages@v4
