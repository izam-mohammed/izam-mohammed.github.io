# auto-logs every push into the changelog page so i don't have to.
# 'cause let's be real, i WILL forget to update it by hand. every single time.
name: write it down before i forget

on:
  # every push to main gets immortalized in the wall of shame
  push:
    branches: ["main"]

  # manual re-run, for when ya need it
  workflow_dispatch:

# the bot needs write access to push the updated changelog back
permissions:
  contents: write

# one at a time so two pushes don't fight over the file
concurrency:
  group: "changelog"
  cancel-in-progress: false

jobs:
  log-it:
    # don't loop on the bot's own changelog commit
    if: ${{ github.actor != 'github-actions[bot]' && !contains(github.event.head_commit.message, '[skip changelog]') }}
    runs-on: ubuntu-latest
    steps:
      - name: grab the code
        uses: actions/checkout@v6

      - name: jot down the latest commit
        run: |
          FILE="brain-dumps/whats-changed/index.html"
          SHA="$GITHUB_SHA"
          SHORT="${SHA:0:7}"
          DATE="$(git log -1 --date=format:'%d %b %Y' --format='%ad' "$SHA")"
          MSG="$(git log -1 --format='%s' "$SHA")"

          # already logged? bail. keeps re-runs idempotent
          if grep -q "/commit/$SHA\"" "$FILE"; then
            echo "already in the changelog, nothin' to do"
            exit 0
          fi

          # html-escape the message so apostrophes 'n' angle brackets don't break the page
          ESC="$(printf '%s' "$MSG" | python3 -c 'import sys, html; print(html.escape(sys.stdin.read()), end="")')"
          LINE="        <li><a href=\"https://github.com/$GITHUB_REPOSITORY/commit/$SHA\"><code>$SHORT</code></a> — $ESC <small>($DATE)</small></li>"

          # slot it in right after the <ul> so newest stays on top
          awk -v line="$LINE" '!ins && /<ul>/ {print; print line; ins=1; next} {print}' "$FILE" > "$FILE.tmp"
          mv "$FILE.tmp" "$FILE"
          echo "logged $SHORT — $MSG"

      - name: regenerate the derived files (sitemap, robots, llms.txt, openapi)
        run: python3 scripts/gen-meta.py

      - name: push it back if somethin' changed
        run: |
          FILES="brain-dumps/whats-changed/index.html sitemap.xml robots.txt llms.txt openapi.json"
          if git diff --quiet -- $FILES; then
            echo "no changes, skippin' commit"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add $FILES
          git commit -m "chore: log ${GITHUB_SHA:0:7} + refresh metadata [skip changelog]"
          git push
