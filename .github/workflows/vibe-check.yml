# the bouncer. keeps frameworks out and makes sure every page actually ships.
# fails the build if someone sneaks in tailwind/node_modules or forgets .deployinclude.
name: vibe check

on:
  # every push deserves a vibe check
  push:
    branches: ["main"]

  # for when you need a manual vibe check at 3am
  workflow_dispatch:

jobs:
  check-the-vibes:
    runs-on: ubuntu-latest
    steps:
      - name: grab the code
        uses: actions/checkout@v6

      - name: check if anyone added tailwind
        run: |
          if grep -r "tailwind" --include="*.css" --include="*.js" . 2>/dev/null || grep -r "cdn.tailwindcss\|tailwindcss.com" --include="*.html" . 2>/dev/null; then
            echo "🚨 TAILWIND DETECTED. WHO DID THIS. CALLIN' THE POLICE."
            exit 1
          else
            echo "✅ no tailwind. faith in humanity restored."
            echo "(mentionin' it in a list doesn't count. usin' it does.)"
          fi

      - name: check if anyone added node_modules
        run: |
          if [ -d "node_modules" ]; then
            echo "🚨 node_modules found. this repo was supposed to be pure. who hurt you?"
            exit 1
          else
            echo "✅ no node_modules. this website still loads faster than your blinker fluid."
          fi

      - name: make sure every page actually ships (forgotten-page guard)
        run: |
          # every .html file's top-level path has to be whitelisted in .deployinclude,
          # otherwise it silently 404s on the live site. catch it before it embarrasses us.
          missing=0
          while IFS= read -r f; do
            f="${f#./}"
            top="${f%%/*}"   # first path segment (or the filename itself for root files)
            if ! grep -qxF "$top" .deployinclude; then
              echo "::error file=$f::'$f' won't deploy — add '$top' to .deployinclude or it'll 404"
              missing=1
            fi
          done < <(find . -name "*.html" -not -path "./.git/*" -not -path "./node_modules/*")
          if [ "$missing" -eq 0 ]; then
            echo "✅ every page is wired up to actually ship. no orphans."
          else
            echo "🚨 found page(s) that won't deploy. fix .deployinclude before this 404s in public."
            exit 1
          fi
